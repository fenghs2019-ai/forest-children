<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>爱（AI）解题叶渡诗河 · 诗篇详情</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1f12;--bg2:#132a18;--bg3:#1a3520;
  --accent:#52c276;--accent2:#76d896;--accent3:#a8e6c0;
  --text:#e8f5e9;--text2:#b2dfdb;--text3:#80cbc4;
  --gold:#f9d56e;--gold2:#fbe599;
  --card:#1e3a24;--card2:#243d2a;
  --shadow:rgba(0,0,0,0.5);
}
body{background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","PingFang SC",sans-serif;min-height:100vh;overflow-x:visible;overflow-y:auto;-webkit-animation:fixlayout 0.001s}@-webkit-keyframes fixlayout{0%{opacity:0.99}100%{opacity:1}}

/* 顶部导航 */
.top-nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(13,31,18,0.95);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(82,194,118,0.2);
  padding:12px 24px;display:flex;align-items:center;gap:16px;
}
.back-btn{
  display:flex;align-items:center;gap:6px;
  color:var(--accent);text-decoration:none;font-size:14px;
  padding:6px 14px;border:1px solid var(--accent);border-radius:20px;
  transition:all 0.2s;cursor:pointer;background:transparent;
}
.back-btn:hover{background:rgba(82,194,118,0.15)}
.nav-title{font-size:16px;color:var(--text2);font-weight:500}
.nav-subtitle{font-size:13px;color:var(--text3);margin-left:auto}

/* 英雄区 */
.hero{
  margin-top:60px;padding:60px 24px 40px;
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  text-align:center;border-bottom:1px solid rgba(82,194,118,0.15);
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(82,194,118,0.08),transparent 70%);
  pointer-events:none;
}
.poem-number{
  font-size:13px;color:var(--accent);letter-spacing:3px;
  text-transform:uppercase;margin-bottom:16px;
}
.poem-char-display{
  font-size:96px;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--accent2),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;margin-bottom:16px;
  text-shadow:none;
  filter:drop-shadow(0 0 30px rgba(249,213,110,0.3));
}
.poem-full-title{font-size:18px;color:var(--text2);margin-bottom:8px}
.poem-author{font-size:14px;color:var(--text3)}
.poem-stats-row{
  display:flex;justify-content:center;gap:32px;
  margin-top:24px;flex-wrap:wrap;
}
.stat-badge{
  background:rgba(82,194,118,0.1);border:1px solid rgba(82,194,118,0.25);
  border-radius:20px;padding:6px 18px;font-size:13px;color:var(--accent3);
}

/* 标签页 */
.tabs-container{
  position:sticky;top:60px;z-index:90;
  background:rgba(13,31,18,0.97);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(82,194,118,0.15);
}
.tabs{
  display:flex;overflow-x:auto;
  scrollbar-width:none;padding:0 16px;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:14px 20px;font-size:14px;
  color:var(--text3);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all 0.2s;white-space:nowrap;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--accent2)}

/* 内容区 */
.content{max-width:840px;margin:0 auto;padding:40px 20px 80px}
.section{display:none}
.section.active{display:block}

/* 原文样式 */
.poem-text-box{
  background:var(--card);border:1px solid rgba(82,194,118,0.2);
  border-radius:16px;padding:40px;margin-bottom:24px;
  position:relative;
}
.poem-text-box::before{
  content:'"';position:absolute;top:20px;left:24px;
  font-size:60px;color:rgba(82,194,118,0.15);font-family:serif;line-height:1;
}
.poem-text{
  font-size:18px;line-height:2.4;
  white-space:pre-line;text-align:center;
  color:var(--text);letter-spacing:1px;
}
.poem-stanza-num{
  font-size:12px;color:var(--text3);text-align:center;
  margin-bottom:4px;letter-spacing:2px;
}

/* 通用卡片 */
.card{
  background:var(--card);border:1px solid rgba(82,194,118,0.15);
  border-radius:12px;padding:24px;margin-bottom:20px;
}
.card-title{
  font-size:13px;color:var(--accent);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:16px;
  padding-bottom:10px;border-bottom:1px solid rgba(82,194,118,0.15);
  display:flex;align-items:center;gap:8px;
}
.card-title::before{content:'▶';font-size:10px}

/* 标签云 */
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.tag{
  background:rgba(82,194,118,0.1);border:1px solid rgba(82,194,118,0.25);
  border-radius:20px;padding:4px 14px;font-size:13px;color:var(--accent3);
}
.tag.gold{
  background:rgba(249,213,110,0.1);border-color:rgba(249,213,110,0.3);
  color:var(--gold2);
}

/* 概述/背景 */
.info-row{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;
}
@media(max-width:560px){.info-row{grid-template-columns:1fr}}
.info-cell{
  background:var(--card2);border-radius:8px;padding:14px;
}
.info-label{font-size:12px;color:var(--text3);margin-bottom:6px}
.info-value{font-size:15px;color:var(--text)}

/* 人物卡片 */
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.char-card{
  background:var(--card2);border-radius:10px;padding:16px;
  border:1px solid rgba(82,194,118,0.1);
}
.char-name{font-size:16px;color:var(--gold2);margin-bottom:6px;font-weight:600}
.char-role{font-size:12px;color:var(--accent);margin-bottom:8px}
.char-desc{font-size:13px;color:var(--text2);line-height:1.6}

/* 时间线 */
.timeline{position:relative;padding-left:40px}
.timeline::before{
  content:'';position:absolute;left:14px;top:0;bottom:0;
  width:2px;background:linear-gradient(to bottom,var(--accent),transparent);
}
.timeline-item{
  position:relative;margin-bottom:28px;
}
.timeline-dot{
  position:absolute;left:-32px;top:4px;
  width:16px;height:16px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 12px rgba(82,194,118,0.5);
  display:flex;align-items:center;justify-content:center;
}
.timeline-dot span{font-size:8px;color:#000;font-weight:bold}
.timeline-phase{
  font-size:13px;color:var(--accent);letter-spacing:1px;margin-bottom:6px;
}
.timeline-content{
  background:var(--card);border-radius:8px;padding:14px;
  border-left:3px solid var(--accent);
  font-size:14px;line-height:1.8;color:var(--text2);
}
.timeline-lines{
  font-size:15px;color:var(--text);line-height:2;
  border-bottom:1px solid rgba(82,194,118,0.1);margin-bottom:8px;
  padding-bottom:8px;white-space:pre-line;
}

/* 价值观 */
.value-main{
  font-size:18px;line-height:1.8;color:var(--gold2);
  text-align:center;padding:24px;
  background:linear-gradient(135deg,rgba(249,213,110,0.05),rgba(82,194,118,0.05));
  border-radius:12px;border:1px solid rgba(249,213,110,0.15);
  margin-bottom:20px;
}
.value-item{
  background:var(--card2);border-radius:8px;padding:14px;margin-bottom:10px;
  font-size:14px;color:var(--text2);line-height:1.7;
  border-left:3px solid var(--accent2);padding-left:16px;
}
.value-children{
  background:rgba(82,194,118,0.05);border-radius:12px;
  padding:20px;border:1px dashed rgba(82,194,118,0.2);
  font-size:15px;line-height:1.8;color:var(--accent3);text-align:center;
}

/* 章节 */
.chapter-item{
  background:var(--card);border-radius:10px;padding:20px;margin-bottom:16px;
  border:1px solid rgba(82,194,118,0.12);
}
.chapter-header{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
}
.chapter-num{
  width:32px;height:32px;border-radius:50%;
  background:var(--accent);color:#000;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:14px;flex-shrink:0;
}
.chapter-title{font-size:16px;color:var(--gold2);font-weight:600}
.chapter-stats{font-size:12px;color:var(--text3);margin-left:auto}
.chapter-text{
  font-size:15px;line-height:2.2;color:var(--text);
  white-space:pre-line;margin-bottom:12px;
  border-left:2px solid rgba(82,194,118,0.3);padding-left:14px;
}
.chapter-analysis{font-size:13px;color:var(--text2);line-height:1.6;font-style:italic}

/* 诗篇导航 */
.poem-nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:48px;padding-top:24px;
  border-top:1px solid rgba(82,194,118,0.15);
}
.nav-poem-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid rgba(82,194,118,0.2);
  border-radius:10px;padding:12px 20px;cursor:pointer;
  color:var(--text2);font-size:14px;transition:all 0.2s;
}
.nav-poem-btn:hover{background:var(--card2);border-color:var(--accent);color:var(--accent)}
.nav-poem-char{font-size:22px;color:var(--gold2);font-weight:bold}

/* 加载提示 */
.loading{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:50vh;gap:16px;
}
.loading-spinner{
  width:40px;height:40px;border:3px solid rgba(82,194,118,0.2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.error-box{
  text-align:center;padding:60px 20px;color:var(--text3);
}
.error-char{font-size:60px;margin-bottom:16px}

/* 手法标签 */
.technique-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.technique-card{
  background:var(--card2);border-radius:10px;padding:16px;
  border:1px solid rgba(82,194,118,0.1);text-align:center;
}
.technique-name{font-size:16px;color:var(--accent2);font-weight:600;margin-bottom:8px}
.technique-desc{font-size:13px;color:var(--text3);line-height:1.6}

/* 手机适配 */
@media(max-width:640px){
  .hero{padding:48px 16px 32px}
  .poem-char-display{font-size:72px}
  .content{padding:24px 16px 60px}
  .poem-text{font-size:16px}
  .tab{padding:12px 14px}
}

/* 配图配乐区 */
.media-container{display:grid;grid-template-columns:1fr;gap:24px;margin-top:20px}
.media-card{
  background:var(--card);border:1px solid rgba(82,194,118,0.2);
  border-radius:16px;overflow:hidden;
}
.media-header{
  background:rgba(82,194,118,0.1);padding:12px 20px;
  font-size:13px;color:var(--accent);letter-spacing:1px;
  border-bottom:1px solid rgba(82,194,118,0.15);
  display:flex;align-items:center;gap:8px;
}
.media-header::before{content:'♪'}
.poem-image{
  width:100%;
  max-height:60vh;
  object-fit:contain;
  display:block;
  border-radius:8px;
}
.audio-player{
  width:100%;padding:20px;background:var(--card2);
}
.audio-player audio{
  width:100%;height:40px;
  border-radius:20px;
}
.media-placeholder{
  padding:60px 20px;text-align:center;color:var(--text3);font-size:14px;
}

/* 配图配乐 section 顶部间距 */
#section-image, #section-audio{
  padding-top:20px;
}

/* 图片轮播 */
.image-slider{
  position:relative;max-width:100%;overflow:hidden;border-radius:12px;
}
.slider-container{
  display:flex;transition:transform 0.4s ease;
}
.slider-img{
  width:100%;flex-shrink:0;object-fit:contain;
  background:var(--bg2);min-height:200px;
}
.slider-dots{
  text-align:center;padding:12px 0;
}
.dot{
  display:inline-block;width:8px;height:8px;
  border-radius:50%;background:rgba(82,194,118,0.3);
  margin:0 4px;cursor:pointer;transition:all 0.3s;
}
.dot.active{
  background:var(--accent);width:20px;border-radius:4px;
}
.slider-arrows{
  position:absolute;top:50%;left:0;right:0;
  transform:translateY(-50%);
  display:flex;justify-content:space-between;
  padding:0 8px;pointer-events:none;
}
.slider-btn{
  background:rgba(0,0,0,0.5);border:none;color:white;
  width:36px;height:36px;border-radius:50%;
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  pointer-events:all;transition:background 0.2s;
}
.slider-btn:hover{background:rgba(0,0,0,0.7)}

/* 双音频 */
.audio-item{
  margin-bottom:20px;
}
.audio-label{
  font-size:13px;color:var(--text3);margin-bottom:8px;
  padding-left:4px;
}
</style>
</head>

路\n　\n一个被海水包围的世界\n直立在路的尽头\n垂直的水墙可以自由穿行\n巨大的蘑菇站在向下生长的树上\n　\n外面世界的森林里\n月亮缺的那条线\n被这个世界捡起\n悬浮在水中闪闪发光\n　\n彩色的小鱼钻进你的长发\n他们以为那是一种新的海藻\n树叶是活的贝壳\n忽扇着搅动海水\n　\n你试探着用鼻子呼吸\n带着甜味的清凉穿透胸膛\n水母吐着泡泡凑过来\n用长长的触角挠你的脚\n　\n你抬头看到蘑菇憨憨的微笑\n有种让人沉睡的魔力\n醒来时躺在老树脚下\n你看着四周不知所措\n　\n水滴从发梢滑落到嘴角\n你伸出舌头舔着咸的味道\n手里握着白色的蘑菇\n带着他特有的憨笑","raw_lines":["月亮缺了一条线时","你去森林的另一头赴约","敲开老树的门","默念咒语寻找那条秘径","初冬的夜晚有点冷","鼻子痒痒的打个喷嚏","咒语中断了一下","眼前现出岔路","一个被海水包围的世界","直立在路的尽头","垂直的水墙可以自由穿行","巨大的蘑菇站在向下生长的树上","外面世界的森林里","月亮缺的那条线","被这个世界捡起","悬浮在水中闪闪发光","彩色的小鱼钻进你的长发","他们以为那是一种新的海藻","树叶是活的贝壳","忽扇着搅动海水","你试探着用鼻子呼吸","带着甜味的清凉穿透胸膛","水母吐着泡泡凑过来","用长长的触角挠你的脚","你抬头看到蘑菇憨憨的微笑","有种让人沉睡的魔力","醒来时躺在老树脚下","你看着四周不知所措","水滴从发梢滑落到嘴角","你伸出舌头舔着咸的味道","手里握着白色的蘑菇","带着他特有的憨笑"],"stats":{"total_chars":290,"line_count":32,"stanza_count":8},"overview":{"summary":"《幻》是\"森林的孩子\"系列第46篇故事诗，全诗约290字，4节，以\"幻\"为核心意象，平静沉思，主题围绕精神展开。","theme":"精神","emotion_tone":"平静沉思","core_image":"幻","keywords":["幻","精神"]},"background":{"cultural":"中国传统文人重视精神修养，\"幻\"代表的艺术与精神追求，体现了深厚的人文情怀。","forest_connection":"文中的\"森林\"等意象，将人类情感与森林自然融为一体，是系列主题的有机组成","series_position":"本篇为系列第46篇，在162首中承担着前期积累的功能。"},"characters":[{"name":"小鱼","role":"主角","description":"诗中的小鱼，承载着故事的情感与主题"},{"name":"老树","role":"配角","description":"诗中的老树，承载着故事的情感与主题"},{"name":"你","role":"配角","description":"诗中的你，承载着故事的情感与主题"},{"name":"他","role":"配角","description":"诗中的他，承载着故事的情感与主题"}],"timeline":[{"phase":"铺垫","stanza_index":1,"lines":["月亮缺了一条线时","你去森林的另一头赴约","敲开老树的门","默念咒语寻找那条秘径","初冬的夜晚有点冷","鼻子痒痒的打个喷嚏","咒语中断了一下","眼前现出岔路"],"description":"第1节：月亮缺了一条线时、你去森林的另一头赴约……"},{"phase":"疑惑","stanza_index":2,"lines":["一个被海水包围的世界","直立在路的尽头","垂直的水墙可以自由穿行","巨大的蘑菇站在向下生长的树上","外面世界的森林里","月亮缺的那条线","被这个世界捡起","悬浮在水中闪闪发光"],"description":"第2节：一个被海水包围的世界、直立在路的尽头……"},{"phase":"探寻","stanza_index":3,"lines":["彩色的小鱼钻进你的长发","他们以为那是一种新的海藻","树叶是活的贝壳","忽扇着搅动海水","你试探着用鼻子呼吸","带着甜味的清凉穿透胸膛","水母吐着泡泡凑过来","用长长的触角挠你的脚"],"description":"第3节：彩色的小鱼钻进你的长发、他们以为那是一种新的海藻……"},{"phase":"顿悟","stanza_index":4,"lines":["你抬头看到蘑菇憨憨的微笑","有种让人沉睡的魔力","醒来时躺在老树脚下","你看着四周不知所措","水滴从发梢滑落到嘴角 ed","folder":"output-冰","has_dual_images":false,"has_dual_audio":false},"60":{"id":"060","num":60,"char":"芽","title":"芽","full_title":"森林的孩子·芽","series":"森林的孩子","author_note":"叶渡","original_text":"平安夜的晚上\n森林里充满孩子们的欢笑\n驱走冬魔的长老\n在篝火旁的树下喝酒\n　\n孩子们用力吹起号角\n想让春天早早回来\n我拉着你悄悄离开\n登上老树的树顶\n　\n你坐在树顶的枯枝上\n晃悠着双脚看着天上的月亮\n又要展示什么新魔法？\n还是又有什么恶作剧？\n　\n我拨开密密匝匝的树枝\n一边回忆一边寻找\n不是新魔法也不是恶作剧\n是我在午后的新发现\n　\n就在这里 就在这里\n月亮和你一起凑过来\n就在那里 就在那里\n你也看到了嫩绿的小树芽\n　\n不是新魔法 不是恶作剧\n这是株不怕冬魔的小树芽\n不是新魔法 不是恶作剧\n这是株期待春天的小树芽\n　\n我挠挠头吞吞吐吐地说出\n练习一个下午的台词\n我能不能和你一起\n等待树芽长成树叶……","raw_lines":["平安夜的晚上","森林里充满孩子们的欢笑","驱走冬魔的长老","在篝火旁的树下喝酒","孩子们用力吹起号角","想让春天早早回来","我拉着你悄悄离开","登上老树的树顶","你坐在树顶的枯枝上","晃悠着双脚看着天上的月亮","又要展示什么新魔法？","还是又有什么恶作剧？","我拨开密密匝匝的树枝","一边回忆一边寻找","不是新魔法也不是恶作剧","是我在午后的新发现","就在这里 就在这里","月亮和你一起凑过来","就在那里 就在那里","你也看到了嫩绿的小树芽","不是新魔法 不是恶作剧","这是株不怕冬魔的小树芽","不是新魔法 不是恶作剧","这是株期待春天的小树芽","我挠挠头吞吞吐吐地说出","练习一个下午的台词","我能不能和你一起","等待树芽长成树叶……"],"stats":{"total_chars":260,"line_count":28,"stanza_count":7},"overview":{"summary":"《芽》是\"森林的孩子\"系列第60篇故事诗，全诗约260字，4节，以\"芽\"为核心意象，温暖积极，主题围绕生命展开。","theme":"生命","emotion_tone":"温暖积极","core_image":"芽","keywords":["芽","生命"]},"background":{"cultural":"生命意象在中国诗歌中代表生生不息的精神，\"芽\"在此意义下承载着对生命的礼赞。","forest_connection":"文中的\"森林\"等意象，将人类情感与森林自然融为一体，是系列主题的有机组成","series_position":"本篇为系列第60篇，在162首中承担着中期深化的功能。"},"characters":[{"name":"孩子","role":"主角","description":"诗中的孩子，承载着故事的情感与主题"},{"name":"老树","role":"配角","description":"诗中的老树，承载着故事的情感与主题"},{"name":"我","role":"配角","description":"诗中的我，承载着故事的情感与主题"},{"name":"你","role":"配角","description":"诗中的你，承载着故事的情感与主题"}],"timeline":[{"phase":"初见","stanza_index":1,"lines":["平安夜的晚上","森林里充满孩子们的欢笑","驱走冬魔的长老","在篝火旁的树下喝酒","孩子们用力吹起号角","想让春天早早回来","我拉着你悄悄离开"],"description":"第1节：平安夜的晚上、森林里充满孩子们的欢笑……"},{"phase":"凝视","stanza_index":2,"lines":["登上老树的树顶","你坐在树顶的枯枝上","晃悠着双脚看着天上的月亮","又要展示什么新魔法？","还是又有什么恶作剧？","我拨开密密匝匝的树枝","一边回忆一边寻找"],"description":"第2节：登上老树的树顶、你坐在树顶的枯枝上……"},{"phase":"触动","stanza_index":3,"lines":["不是新魔法也不是恶作剧","是我在午后的新发现","就在这里 就在这里","月亮和你一起凑过来","就在那里 就在那里","你也看到了嫩绿 \n——天呐，你想起那可怕的魔音\n　\n小个子的竖笛是自己做的\n小个子的吹法是自己发明的\n可怕的杂音让老树抖落了一地叶子\n可怕的杂音让小鸟从树上跌落\n　\n孩子们捂住耳朵的时候\n偷练了整个夏天的小个子\n一脸自信地吹响竖笛\n那音乐终于来了……\n　\n新的笛声轻巧地加入你的笛声里\n像一只小鸟飞过树丛\n像夜晚的星星在云里穿梭\n小个子骄傲地看着你脸上的惊喜\n　\n高高低低的笛声\n和着月光，飘荡在森林里","raw_lines":["叶子开始泛黄的季节","月亮开始消瘦的夜晚","白天玩累了的孩子们","围坐在树下点起篝火","你吹起竖笛","顽皮的风不再捉弄那些叶子","安静的叶子像竖起的耳朵","陶醉地倾听丝一样的旋律","小个子爬上树干","和你肩并肩坐在一起","你看着他点头微笑","闭上眼沉浸在演奏里","——哎呀，他要干什么？","——哎呀，不要捣乱啊！","树下的孩子们纷纷轻呼","你睁开眼看见可怕的一幕","小个子慢悠悠地掏出一只竖笛","用力吸口气把笛子凑到嘴边","——天呐，你想起春天里的聚会","——天呐，你想起那可怕的魔音","小个子的竖笛是自己做的","小个子的吹法是自己发明的","可怕的杂音让老树抖落了一地叶子","可怕的杂音让小鸟从树上跌落","孩子们捂住耳朵的时候","偷练了整个夏天的小个子","一脸自信地吹响竖笛","那音乐终于来了……","新的笛声轻巧地加入你的笛声里","像一只小鸟飞过树丛","像夜晚的星星在云里穿梭","小个子骄傲地看着你脸上的惊喜","高高低低的笛声","和着月光，飘荡在森林里"],"stats":{"total_chars":360,"line_count":34,"stanza_count":9},"overview":{"summary":"《和》是\"森林的孩子\"系列第97篇故事诗，全诗约360字，4节，以\"和\"为核心意象，温暖积极，主题围绕哲思展开。","theme":"哲思","emotion_tone":"温暖积极","core_image":"和","keywords":["和","哲思"]},"background":{"cultural":"中国哲学强调天人合一，\"和\"在此体现了对人与自然、人与社会关系的深度思考。","forest_connection":"文中的\"森林\"等意象，将人类情感与森林自然融为一体，是系列主题的有机组成","series_position":"本篇为系列第97篇，在162首中承担着中期深化的功能。"},"characters":[{"name":"孩子","role":"主角","description":"诗中的孩子，承载着故事的情感与主题"},{"name":"老树","role":"配角","description":"诗中的老树，承载着故事的情感与主题"},{"name":"你","role":"配角","description":"诗中的你，承载着故事的情感与主题"},{"name":"他","role":"配角","description":"诗中的他，承载着故事的情感与主题"}],"timeline":[{"phase":"铺垫","stanza_index":1,"lines":["叶子开始泛黄的季节","月亮开始消瘦的夜晚","白天玩累了的孩子们","围坐在树下点起篝火","你吹起竖笛","顽皮的风不再捉弄那些叶子","安静的叶子像竖起的耳朵","陶醉地倾听丝一样的旋律"],"description":"第1节：叶子开始泛黄的季节、月亮开始消瘦的夜晚……"},{"phase":"疑惑","stanza_index":2,"lines":["小个子爬上树干","和你肩并肩坐在一起","你看着他点头微笑","闭上眼沉浸在演奏里","——哎呀，他要干什么？","——哎呀，不要捣乱啊！","树下的孩子们纷纷轻呼","你睁开眼看见可怕的一幕"],"description":"第2节：小个子爬上树干、和你肩并肩坐在一起……"},{"phase":"探寻","stanza_index":3,"lines":["小个子慢悠悠地掏出一只竖笛","用力吸口气把笛子凑到嘴边","——天呐，你想起春天里的聚会","——天呐，你想起那可怕的魔音","小个子的竖笛是自己做的","小个子的吹法是自己发明的","可怕的杂音让老树抖落了一地叶子","可怕的杂音让小鸟从树上跌落"],"description":"第3节：小个子慢悠悠地掏出一只竖笛、用力吸口气把笛子凑到嘴边……"},{"phase":"顿悟","stanza_index":4,"lines":["孩子们捂住耳朵的时候","偷练了整个夏天的小个子 inal_text":"长老的咒语解救了月亮\n挣脱暗魔法的月亮\n将银色光华铺满森林\n入侵的黑影无处遁逃\n　\n黑影将自己裹进一团雾\n森林的魔法摧散黑雾的时候\n无数个黑影冲出\n将孩子包围在中间\n　\n被箭击碎的影子\n却会在另一个角落重现\n黑影在夜空中狂笑\n得意地等待孩子用光他的箭\n　\n孩子取出最后一根箭\n慢慢闭上眼睛\n用心和每棵树对话\n来吧 我的朋友们\n　\n告诉我那邪恶的黑影藏在哪里\n每棵树上都派出自己的叶子\n起飞编队在空中变成路标\n盘旋后悬停在老树背后\n　\n叶子在半空中俯冲下来\n黑影抬头惊诧的瞬间\n孩子猛然抬起弓\n箭头直指老树背后的黑影\n　\n利箭破空\n听到胜利的号角声","raw_lines":["长老的咒语解救了月亮","挣脱暗魔法的月亮","将银色光华铺满森林","入侵的黑影无处遁逃","黑影将自己裹进一团雾","森林的魔法摧散黑雾的时候","无数个黑影冲出","将孩子包围在中间","被箭击碎的影子","却会在另一个角落重现","黑影在夜空中狂笑","得意地等待孩子用光他的箭","孩子取出最后一根箭","慢慢闭上眼睛","用心和每棵树对话","来吧 我的朋友们","告诉我那邪恶的黑影藏在哪里","每棵树上都派出自己的叶子","起飞编队在空中变成路标","盘旋后悬停在老树背后","叶子在半空中俯冲下来","黑影抬头惊诧的瞬间","孩子猛然抬起弓","箭头直指老树背后的黑影","利箭破空","听到胜利的号角声"],"stats":{"total_chars":235,"line_count":26,"stanza_count":7},"overview":{"summary":"《智》是\"森林的孩子\"系列第98篇故事诗，全诗约235字，4节，以\"智\"为核心意象，温暖积极，主题围绕哲思展开。","theme":"哲思","emotion_tone":"温暖积极","core_image":"智","keywords":["智","哲思"]},"background":{"cultural":"中国哲学强调天人合一，\"智\"在此体现了对人与自然、人与社会关系的深度思考。","forest_connection":"文中的\"森林\"等意象，将人类情感与森林自然融为一体，是系列主题的有机组成","series_position":"本篇为系列第98篇，在162首中承担着中期深化的功能。"},"characters":[{"name":"孩子","role":"主角","description":"诗中的孩子，承载着故事的情感与主题"},{"name":"老树","role":"配角","description":"诗中的老树，承载着故事的情感与主题"},{"name":"我","role":"配角","description":"诗中的我，承载着故事的情感与主题"},{"name":"他","role":"配角","description":"诗中的他，承载着故事的情感与主题"}],"timeline":[{"phase":"铺垫","stanza_index":1,"lines":["长老的咒语解救了月亮","挣脱暗魔法的月亮","将银色光华铺满森林","入侵的黑影无处遁逃","黑影将自己裹进一团雾","森林的魔法摧散黑雾的时候"],"description":"第1节：长老的咒语解救了月亮、挣脱暗魔法的月亮……"},{"phase":"疑惑","stanza_index":2,"lines":["无数个黑影冲出","将孩子包围在中间","被箭击碎的影子","却会在另一个角落重现","黑影在夜空中狂笑","得意地等待孩子用光他的箭"],"description":"第2节：无数个黑影冲出、将孩子包围在中间……"},{"phase":"探寻","stanza_index":3,"lines":["孩子取出最后一根箭","慢慢闭上眼睛","用心和每棵树对话","来吧 我的朋友们","告诉我那邪恶的黑影藏在哪里","每棵树上都派出自己的叶子"],"description":"第3节：孩子取出最后一根箭、慢慢闭上眼睛……"},{"phase":"顿悟","stanza_index":4,"lines":["起飞编队在空中变成路标","盘旋后悬停在老树背后","叶子在半空中俯冲下来","黑影抬头惊诧的瞬间","孩子猛然抬起弓","箭头直指老树背后的黑影","利箭破空","听到胜利的号角声"],"description":"第4节：起飞编队在空中变成路标、盘旋后悬停在老树背后……"}],"values":{"core":"停下来思考，是对生命最深的尊重","extended" e":"诺","full_title":"森林的孩子·诺","series":"森林的孩子","author_note":"叶渡","original_text":"静谧的夜里\n微风轻轻滑过树叶\n在淡淡的星光下\n泛起绿色涟漪\n　\n夜空中忽然响起\n孩子的大声呼喊\n长老钻出树洞抬头看天空\n惊呆的长老差点跌落树下\n　\n一颗流星在空中乱窜\n身上缠着密密匝匝的树藤\n孩子在努力攥紧藤蔓的另一端\n像是要驯服一头野鹿\n　\n哟哟——呼——！\n孩子随着流星穿梭在云间\n呀呀——呼——！\n跌进河里又跳出来飞向树丛\n　\n吧里吧里星星石——哟——呼！\n孩子在百忙之中不停地念叨\n——嗯？那是星星变石头的咒语啊！\n长老钻回树洞去找他的魔法书\n　\n——哎呀呀！你个小调皮！\n长老捧着被撕掉一页的魔法书\n吧里吧里星星石——哟——呼！\n孩子得意地举着一页羊皮纸\n　\n累坏了的流星越来越小\n终于不再四处飞  \n孩子伸手抓住小星星\n用一根细藤穿起来\n　\n——别急，别急，项链马上就做好！\n——不急，不急，你要小心别摔倒！\n长老转身回头看见你\n背着双手站在高高的树顶\n　\n——你看，我答应送你的星星\n——嗯哼，谢谢你的礼物","raw_lines":["静谧的夜里","微风轻轻滑过树叶","在淡淡的星光下","泛起绿色涟漪","夜空中忽然响起","孩子的大声呼喊","长老钻出树洞抬头看天空","惊呆的长老差点跌落树下","一颗流星在空中乱窜","身上缠着密密匝匝的树藤","孩子在努力攥紧藤蔓的另一端","像是要驯服一头野鹿","哟哟——呼——！","孩子随着流星穿梭在云间","呀呀——呼——！","跌进河里又跳出来飞向树丛","吧里吧里星星石——哟——呼！","孩子在百忙之中不停地念叨","——嗯？那是星星变石头的咒语啊！","长老钻回树洞去找他的魔法书","——哎呀呀！你个小调皮！","长老捧着被撕掉一页的魔法书","吧里吧里星星石——哟——呼！","孩子得意地举着一页羊皮纸","累坏了的流星越来越小","终于不再四处飞","孩子伸手抓住小星星","用一根细藤穿起来","——别急，别急，项链马上就做好！","——不急，不急，你要小心别摔倒！","长老转身回头看见你","背着双手站在高高的树顶","——你看，我答应送你的星星","——嗯哼，谢谢你的礼物"],"stats":{"total_chars":359,"line_count":34,"stanza_count":9},"overview":{"summary":"《诺》是\"森林的孩子\"系列第116篇故事诗，全诗约359字，4节，以\"诺\"为核心意象，平静沉思，主题围绕哲思展开。","theme":"哲思","emotion_tone":"平静沉思","core_image":"诺","keywords":["诺","哲思"]},"background":{"cultural":"中国哲学强调天人合一，\"诺\"在此体现了对人与自然、人与社会关系的深度思考。","forest_connection":"文中的\"树\"等意象，将人类情感与森林自然融为一体，是系列主题的有机组成","series_position":"本篇为系列第116篇，在162首中承担着后期升华的功能。"},"characters":[{"name":"孩子","role":"主角","description":"诗中的孩子，承载着故事的情感与主题"},{"name":"我","role":"配角","description":"诗中的我，承载着故事的情感与主题"},{"name":"你","role":"配角","description":"诗中的你，承载着故事的情感与主题"},{"name":"他","role":"配角","description":"诗中的他，承载着故事的情感与主题"}],"timeline":[{"phase":"铺垫","stanza_index":1,"lines":["静谧的夜里","微风轻轻滑过树叶","在淡淡的星光下","泛起绿色涟漪","夜空中忽然响起","孩子的大声呼喊","长老钻出树洞抬头看天空","惊呆的长老差点跌落树下"],"description":"第1节：静谧的夜里、微风轻轻滑过树叶……"},{"phase":"疑惑","stanza_index":2,"lines":["一颗流星在空中乱窜","身上缠着密密匝匝的树藤","孩子在努力攥紧藤蔓的另一端","像是要驯服一头野鹿","哟哟——呼——！","孩子随着流星穿梭在云间","呀呀——呼——！","跌进河里又跳出来飞向树丛"],"description":"第2节 了来了，我抓住你的脚了\n两个皮孩子吊在月亮上\n晃晃悠悠地把月亮拖住了\n　\n月亮，月亮，你别走\n月亮，月亮，停一停\n好看的故事书啊没看完\n请你帮忙照个亮\n　\n月亮，月亮，你别哭\n月亮，月亮，你来看\n孩子们举起大木桶\n装满了香甜的夜露水\n　\n月亮停靠在树顶上\n月亮的肚子鼓起来\n孩子们靠在月亮上\n孩子们慢慢睡着了\n　\n月亮调暗了亮度\n月亮扯过些云彩\n白色的被子盖住两个小调皮","raw_lines":["这几天的月亮没吃饱","月亮瘦的呀  两头尖尖的","像我们在夏天","采荷叶时划的小船","饿了的月亮在天空游荡","看到了树叶上的露水","蹑手蹑脚地盘旋在","小森林的上空","正在偷喝露水的月亮","忽然觉得  有什么东西捆住了脚","——啊哦，什么情况啊？","——呃哦，好像……不太对……","老树顶上的树丛里","哗啦啦地钻出两个小脑袋","实在忍不住的笑声","惊醒了正在睡觉的小鸟","我用力扇动翅膀","两只手紧紧攥着两根藤条","两根缠住了月亮脚尖的","很结实很结实的藤条","——嗨嗨嗨，别乐了，快来帮忙啊","——来了来了，我抓住你的脚了","两个皮孩子吊在月亮上","晃晃悠悠地把月亮拖住了","月亮，月亮，你别走","月亮，月亮，停一停","好看的故事书啊没看完","请你帮忙照个亮","月亮，月亮，你别哭","月亮，月亮，你来看","孩子们举起大木桶","装满了香甜的夜露水","月亮停靠在树顶上","月亮的肚子鼓起来","孩子们靠在月亮上","孩子们慢慢睡着了","月亮调暗了亮度","月亮扯过些云彩","白色的被子盖住两个小调皮"],"stats":{"total_chars":365,"line_count":39,"stanza_count":10},"overview":{"summary":"《停》是\"森林的孩子\"系列第147篇故事诗，全诗约365字，4节，以\"停\"为核心意象，平静沉思，主题围绕旅途展开。","theme":"旅途","emotion_tone":"平静沉思","core_image":"停","keywords":["停","旅途"]},"background":{"cultural":"\"行路\"是中国古典诗歌的重要主题，\"停\"呼应了\"路漫漫其修远兮\"的人生求索精神。","forest_connection":"文中的\"森林\"等意象，将人类情感与森林自然融为一体，是系列主题的有机组成","series_position":"本篇为系列第147篇，在162首中承担着后期升华的功能。"},"characters":[{"name":"孩子","role":"主角","description":"诗中的孩子，承载着故事的情感与主题"},{"name":"老树","role":"配角","description":"诗中的老树，承载着故事的情感与主题"},{"name":"我","role":"配角","description":"诗中的我，承载着故事的情感与主题"},{"name":"你","role":"配角","description":"诗中的你，承载着故事的情感与主题"}],"timeline":[{"phase":"起点","stanza_index":1,"lines":["这几天的月亮没吃饱","月亮瘦的呀  两头尖尖的","像我们在夏天","采荷叶时划的小船","饿了的月亮在天空游荡","看到了树叶上的露水","蹑手蹑脚地盘旋在","小森林的上空","正在偷喝露水的月亮"],"description":"第1节：这几天的月亮没吃饱、月亮瘦的呀  两头尖尖的……"},{"phase":"历程","stanza_index":2,"lines":["忽然觉得  有什么东西捆住了脚","——啊哦，什么情况啊？","——呃哦，好像……不太对……","老树顶上的树丛里","哗啦啦地钻出两个小脑袋","实在忍不住的笑声","惊醒了正在睡觉的小鸟","我用力扇动翅膀","两只手紧紧攥着两根藤条"],"description":"第2节：忽然觉得  有什么东西捆住了脚、——啊哦，什么情况啊？……"},{"phase":"困境","stanza_index":3,"lines":["两根缠住了月亮脚尖的","很结实很结实的藤条","——嗨嗨嗨，别乐了，快来帮忙啊","——来了来了，我抓住你的脚了","两个皮孩子吊在月亮上","晃晃悠悠地把月亮拖住了","月亮，月亮，你别走","月亮，月亮，停一停","好看的故事书啊没看完"],"description":"第3节：两根缠住了月亮脚尖的、很结实很结实的藤条……"},{"phase leted","folder":"output-空","has_dual_images":false,"has_dual_audio":false},"152":{"id":"152","num":152,"char":"真","title":"真","full_title":"森林的孩子·真","series":"森林的孩子","author_note":"叶渡","original_text":"这个春天好奇怪\n一切都仿佛乱了秩序\n　\n刚刚融化的河水\n在早上重新结了一层冰\n昨天中午醒来的小熊\n在和小个子下棋的时候\n竟然睡着了\n　\n你站在一棵桃树下\n听见不知所措的花儿们\n在一起小声商量\n咱们要不要\n先躲回到花苞里\n　\n冬叔叔肯定是回了北极\n春姑娘却不知道去了哪里\n你唉声叹气地发牢骚\n这个春天\n是真的春天吗\n　\n当然是，当然是\n我在你的身边坐下\n四周张望\n努力为你寻找\n春天的痕迹\n　\n你看你看，小树的叶子已经开始发芽\n——嗯，可是叶子外面裹着冰啊\n你看你看，小熊已经走出冬眠的山洞\n——嗯，你听不见它的呼噜声吗\n哎呀呀，你这头懒熊怎么又睡了\n……\n　\n你听你听，小河开始唱歌了\n——嗯，有冰块伴奏的冬之歌\n你闻你闻，有花开的香气哦\n——嗯，我只闻到积雪的味道\n哎呀呀，这个……怎么没人扫雪呢\n……\n　\n唉，两个人只好手托着腮发呆\n看着风儿在小森林里乱跑\n四处寻找春姑娘\n忽然，隐约听到长老的召唤\n——孩子们快来，快来帮忙啊\n　\n两个人飞向小森林的边上\n看见长老托着一片大大的叶子\n叶子上躺着的正是春姑娘\n长长的绿色头发\n变成了紫色的海带\n　\n原来，春姑娘在森林里\n用魔法唤醒春天的时候\n四处奔走，攀上每一棵老树\n不小心跌进了\n通往幻境的树洞\n　\n长老念动咒语\n春姑娘的长发变回美丽的绿色\n春姑娘慢慢醒来\n把藏在长发里的魔法种子\n撒向小森林的天空\n　\n放心吧，这一次啊\n春天，真的来了哦","raw_lines":["这个春天好奇怪","一切都仿佛乱了秩序","刚刚融化的河水","在早上重新结了一层冰","昨天中午醒来的小熊","在和小个子下棋的时候","竟然睡着了","你站在一棵桃树下","听见不知所措的花儿们","在一起小声商量","咱们要不要","先躲回到花苞里","冬叔叔肯定是回了北极","春姑娘却不知道去了哪里","你唉声叹气地发牢骚","这个春天","是真的春天吗","当然是，当然是","我在你的身边坐下","四周张望","努力为你寻找","春天的痕迹","你看你看，小树的叶子已经开始发芽","——嗯，可是叶子外面裹着冰啊","你看你看，小熊已经走出冬眠的山洞","——嗯，你听不见它的呼噜声吗","哎呀呀，你这头懒熊怎么又睡了","……","你听你听，小河开始唱歌了","——嗯，有冰块伴奏的冬之歌","你闻你闻，有花开的香气哦","——嗯，我只闻到积雪的味道","哎呀呀，这个……怎么没人扫雪呢","……","唉，两个人只好手托着腮发呆","看着风儿在小森林里乱跑","四处寻找春姑娘","忽然，隐约听到长老的召唤","——孩子们快来，快来帮忙啊","两个人飞向小森林的边上","看见长老托着一片大大的叶子","叶子上躺着的正是春姑娘","长长的绿色头发","变成了紫色的海带","原来，春姑娘在森林里","用魔法唤醒春天的时候","四处奔走，攀上每一棵老树","不小心跌进了","通往幻境的树洞","长老念动咒语","春姑娘的长发变回美丽的绿色","春姑娘慢慢醒来","把藏在长发里的魔法种子","撒向小森林的天空","放心吧，这一次啊","春天，真的来了哦"],"stats":{"total_chars":519,"line_count":56,"stanza_count":12},"overview":{"summary":"《真》是\"森林的孩子\"系列第152篇故事诗，全诗约519字，4节，以\"真\"为核心意象，平静沉思，主题围绕哲思展开。","theme":"哲思","emotion_tone":"平静沉思","core_image":"真","keywords":["真","哲思"]},"background":{"cultural":"中国哲学强调天人合一，\"真\"在此体现了对人与自然、人与社会关系的深度思考。","forest_connection":"文中的\"森林\"等意象，将人类情感与森林自然融为一体，是系列主题的有机组成","series_position":"本篇为系列第152篇，在162首中承担着后期升华的功能。"},"characters":[{"name":"孩子","role 　\n你背上大木桶\n和小个子一起\n跳上一片叶子飞进森林里\n　\n她在你躺过的草地上\n翘起腿叼着一段树枝\n双手枕在脑后催动魔法\n叶子书浮在眼前\n慢慢地自动翻页\n　\n——哎呀呀，我为什么这么闲呢？\n她满意地笑出声来\n用手指卷起几根长发\n　\n太阳下山  月亮升起\n你们坐在小河边吃着浆果\n萤火虫在身边闪闪亮\n孩子们的脸上\n写满开心","raw_lines":["走遍森林的每个角落以后","春姑娘有些累了","靠在老树身上打了个盹","一觉醒来的时候呀","发现夏天已经躺在小河边上","夏天翘着腿打着哈欠","一个个大大的哈欠","传染了森林里的孩子们","躲在树丛里的小个子","闭着眼趴在微微晃动的秋千上","你学着夏天的样子","翘起腿叼着一段树枝","双手枕在脑后催动魔法","叶子书浮在眼前","慢慢地自动翻页","她，坐着一片叶子","从山坡顶上一路滑到河边","稳稳地停在你的身旁","——喂喂喂，你怎么这么闲啊","——哦哦，今天没有任务啊","——幻境的门修好了吗？","——嗯嗯，放心吧，不会有人掉进去了","她满意地点点头","用手指卷起几根长发","——喂喂喂，你怎么这么闲啊","——哦哦，今天没有功课啊","——长老布置的咒语默写默完了？","——嗯嗯，放心吧，你的那份我也写好了","她满意地点点头","用手指卷起几根长发","——喂喂喂，你怎么这么闲啊","——哦哦，今天没有事情啊","——可是，可是我忽然想吃浆果啊","——嗯嗯，放心吧，我现在就去采果子","她满意地点点头","用手指卷起几根长发","你背上大木桶","和小个子一起","跳上一片叶子飞进森林里","她在你躺过的草地上","翘起腿叼着一段树枝","双手枕在脑后催动魔法","叶子书浮在眼前","慢慢地自动翻页","——哎呀呀，我为什么这么闲呢？","她满意地笑出声来","用手指卷起几根长发","太阳下山  月亮升起","你们坐在小河边吃着浆果","萤火虫在身边闪闪亮","孩子们的脸上","写满开心"],"stats":{"total_chars":517,"line_count":52,"stanza_count":11},"overview":{"summary":"《闲》是\"森林的孩子\"系列第153篇故事诗，全诗约517字，4节，以\"闲\"为核心意象，平静沉思，主题围绕旅途展开。","theme":"旅途","emotion_tone":"平静沉思","core_image":"闲","keywords":["闲","旅途"]},"background":{"cultural":"\"行路\"是中国古典诗歌的重要主题，\"闲\"呼应了\"路漫漫其修远兮\"的人生求索精神。","forest_connection":"文中的\"森林\"等意象，将人类情感与森林自然融为一体，是系列主题的有机组成","series_position":"本篇为系列第153篇，在162首中承担着后期升华的功能。"},"characters":[{"name":"孩子","role":"主角","description":"诗中的孩子，承载着故事的情感与主题"},{"name":"老树","role":"配角","description":"诗中的老树，承载着故事的情感与主题"},{"name":"萤火虫","role":"配角","description":"诗中的萤火虫，承载着故事的情感与主题"},{"name":"我","role":"配角","description":"诗中的我，承载着故事的情感与主题"}],"timeline":[{"phase":"起点","stanza_index":1,"lines":["走遍森林的每个角落以后","春姑娘有些累了","靠在老树身上打了个盹","一觉醒来的时候呀","发现夏天已经躺在小河边上","夏天翘着腿打着哈欠","一个个大大的哈欠","传染了森林里的孩子们","躲在树丛里的小个子","闭着眼趴在微微晃动的秋千上","你学着夏天的样子","翘起腿叼着一段树枝","双手枕在脑后催动魔法"],"description":"第1节：走遍森林的每个角落以后、春姑娘有些累了……"},{"phase":"历程","stanza_index":2,"lines":["叶子书浮在眼前","慢慢地自动翻页","她，坐着一片叶子","从山坡顶上一路滑到河边","稳稳地停在你的身旁","——喂喂喂，你怎么这么闲啊","——哦哦，今天没有任务啊","——幻境的门修好了吗？","——嗯嗯，放心吧，不会有人掉进去了","她满意地点点头","用手指卷起几根长发","——喂喂喂，你怎么这么闲啊","——哦哦，今天 森林的孩子","author_note":"叶渡","original_text":"橙色的清晨\n有黑色的雾    扭动着  \n包裹住每一棵树\n安静的森林里\n紧张的味道在弥漫\n　\n浓雾遮住视线\n我索性闭上眼睛\n赤脚    踩着露出地面的树根\n在脑海里回想    那条\n通往森林深处的小径\n　\n默念唤醒树根的咒语\n更多的树根钻出地面\n慢慢伸展    蜿蜒着\n送我穿过半座森林\n找到魔法封禁之地\n　\n一个巨大的绿色茧房\n悬在封禁之地的上空\n用来编织茧房的叶子\n没有秋天该有的金黄\n却有着夏天浓郁的绿\n　\n黑色的雾从各个角落飘过来\n化作一条一条黑色的蛇\n缠住我的手和脚\n却无法再遮蔽我闭着的眼\n看见    茧房里挣扎的身影\n　\n被黑雾打湿的树根们\n无奈    跌回泥土里\n老树轻轻抖落几根树枝\n刺中黑雾化作的蛇\n带着金黄的叶子绕上了我的手臂\n　\n金黄的枝叶做成金色的环\n我向天空伸出手臂\n穿过迷雾穿过厚厚的云层\n从太阳那里借来一缕光\n装入金色枝叶的环\n　\n金色的光环砸向茧房\n悬浮的茧房砰然作响\n绿色的叶子渐渐变黄\n变黄的叶子开始脱落\n化作翻飞的黄色蝴蝶\n　\n摆脱了黑魔法的叶子们\n盘旋着降落到我的肩上\n贴近我的耳朵轻声诉说\n趁着长老和我们去探险\n黑魔法的影子潜入禁地\n　\n保护禁地的绿色屏障\n在夜里  被黑雾冲破\n你守在树洞前做最后的防线\n把森林的守护石藏进了长发\n却不小心掉入黑魔法的茧房\n　\n我手指翻飞  建起\n看不见的思念之桥\n无声接入你的脑海\n金色的光穿透茧房\n无数言语在光里穿梭\n　\n嗨！你有点累了吧\n没关系的    不要怕\n现在，换我来战斗\n我闭着眼看见你的微笑\n长发在茧房里轻轻浮动\n　\n赶来帮忙的风儿\n吹散遮蔽天空的乌云\n阳光洒向小森林\n金色光环更加闪亮\n茧房一层层被剥开\n　\n太阳下山  月亮升起\n黑魔法的影子逃出森林\n躺在你手上的守护石\n散发出美丽的蓝色光芒\n就像你  蓝色的眸","raw_lines":["橙色的清晨","有黑色的雾    扭动着","包裹住每一棵树","安静的森林里","紧张的味道在弥漫","浓雾遮住视线","我索性闭上眼睛","赤脚    踩着露出地面的树根","在脑海里回想    那条","通往森林深处的小径","默念唤醒树根的咒语","更多的树根钻出地面","慢慢伸展    蜿蜒着","送我穿过半座森林","找到魔法封禁之地","一个巨大的绿色茧房","悬在封禁之地的上空","用来编织茧房的叶子","没有秋天该有的金黄","却有着夏天浓郁的绿","黑色的雾从各个角落飘过来","化作一条一条黑色的蛇","缠住我的手和脚","却无法再遮蔽我闭着的眼","看见    茧房里挣扎的身影","被黑雾打湿的树根们","无奈    跌回泥土里","老树轻轻抖落几根树枝","刺中黑雾化作的蛇","带着金黄的叶子绕上了我的手臂","金黄的枝叶做成金色的环","我向天空伸出手臂","穿过迷雾穿过厚厚的云层","从太阳那里借来一缕光","装入金色枝叶的环","金色的光环砸向茧房","悬浮的茧房砰然作响","绿色的叶子渐渐变黄","变黄的叶子开始脱落","化作翻飞的黄色蝴蝶","摆脱了黑魔法的叶子们","盘旋着降落到我的肩上","贴近我的耳朵轻声诉说","趁着长老和我们去探险","黑魔法的影子潜入禁地","保护禁地的绿色屏障","在夜里  被黑雾冲破","你守在树洞前做最后的防线","把森林的守护石藏进了长发","却不小心掉入黑魔法的茧房","我手指翻飞  建起","看不见的思念之桥","无声接入你的脑海","金色的光穿透茧房","无数言语在光里穿梭","嗨！你有点累了吧","没关系的    不要怕","现在，换我来战斗","我闭着眼看见你的微笑","长发在茧房里轻轻浮动","赶来帮忙的风儿","吹散遮蔽天空的乌云","阳光洒向小森林","金色光环更加闪亮","茧房一层层被剥开","太阳下山  月亮升起","黑魔法的影子逃出森林","躺在你手上的守护石","散发出美丽的蓝色光芒","就像你  蓝色的眸"],"stats":{"total_chars":621,"line_count":70,"stanza_count":14},"overview":{"summary":"《破》是\"森林的孩子\"系列第158篇故事诗，全诗约621字，4节，以\"破\"为核心意象，温暖积极，主题围绕人生展开。","theme":"人生","emotion_tone":"温暖积极","core_image":"破","keywords":["破","人生"]},"background":{" 史上\n两个伟大作家的生日\n　\n我得意地看着你\n我的记忆就是这么强吧\n你却噘着嘴很生气\n错了错了，全错了\n　\n你忽然起身\n把叶子本扔在树洞里\n爬上树顶\n扇动翅膀飞走了\n　\n我挠挠头很无奈\n我这是错在哪里了呀\n拾起你的叶子本\n上面都是看不懂的数字串\n　\n我在森林里\n四处寻找着\n是在找答案\n也是在找你\n　\n我在山谷里看见\n我们在夏天遇见的老树桩\n忽然发现有趣的事\n赶紧掏出你的叶子本\n　\n每一圈年轮旁\n都刻着一个数字\n每一个数字旁\n都刻着一个字\n　\n哎呀呀，我忽然明白了\n我把叶子本上的数字\n一个一个还原成字\n一点一点拼成句子\n　\n原来就是这样\n终于找到答案\n我高兴地蹦上老树桩\n摇摆着身子跳起舞\n　\n嗨，你还不是太笨嘛\n我看见你叉着腰\n在空中冲我笑\n我轻声念动咒语\n　\n用树枝和藤缠绕出\n美丽的小桶\n快走快走\n今天，是要采果子的日子哦","raw_lines":["太阳  拎着亮闪闪的小桶","用他特制的刷子","把金色的晨光涂在","森林里的每一片叶子上","你悄悄钻进我的树洞","用一片叶子  挠着我的脚心","我哭笑不得  睁开眼","看见你笑成月牙的眼","你举着叶子做成的本","说要考考我","快说快说  别犹豫","今天是什么日子啊","我一边打哈欠","一边努力检索","长老讲过的知识","在脑海里排成队","可是，可是今天","实在是平凡的一天啊","没有发生过战争","没有发生过灾难","你敲敲我的头说  再想想","哦哦，对了对了","今天是小森林的历史上","两个伟大作家的生日","我得意地看着你","我的记忆就是这么强吧","你却噘着嘴很生气","错了错了，全错了","你忽然起身","把叶子本扔在树洞里","爬上树顶","扇动翅膀飞走了","我挠挠头很无奈","我这是错在哪里了呀","拾起你的叶子本","上面都是看不懂的数字串","我在森林里","四处寻找着","是在找答案","也是在找你","我在山谷里看见","我们在夏天遇见的老树桩","忽然发现有趣的事","赶紧掏出你的叶子本","每一圈年轮旁","都刻着一个数字","每一个数字旁","都刻着一个字","哎呀呀，我忽然明白了","我把叶子本上的数字","一个一个还原成字","一点一点拼成句子","原来就是这样","终于找到答案","我高兴地蹦上老树桩","摇摆着身子跳起舞","嗨，你还不是太笨嘛","我看见你叉着腰","在空中冲我笑","我轻声念动咒语","用树枝和藤缠绕出","美丽的小桶","快走快走","今天，是要采果子的日子哦"],"stats":{"total_chars":487,"line_count":64,"stanza_count":16},"overview":{"summary":"《凡》是\"森林的孩子\"系列第160篇故事诗，全诗约487字，4节，以\"凡\"为核心意象，平静沉思，主题围绕人生展开。","theme":"人生","emotion_tone":"平静沉思","core_image":"凡","keywords":["凡","人生"]},"background":{"cultural":"\"凡\"作为本诗的核心意象，在中国传统文化中承载着丰富的意涵，与\"森林的孩子\"系列的生命主题相呼应。","forest_connection":"文中的\"森林\"等意象，将人类情感与森林自然融为一体，是系列主题的有机组成","series_position":"本篇为系列第160篇，在162首中承担着后期升华的功能。"},"characters":[{"name":"老树","role":"主角","description":"诗中的老树，承载着故事的情感与主题"},{"name":"我","role":"配角","description":"诗中的我，承载着故事的情感与主题"},{"name":"你","role":"配角","description":"诗中的你，承载着故事的情感与主题"},{"name":"他","role":"配角","description":"诗中的他，承载着故事的情感与主题"}],"timeline":[{"phase":"铺垫","stanza_index":1,"lines":["太阳  拎着亮闪闪的小桶","用他特制的刷子","把金色的晨光涂在","森林里的每一片叶子上","你悄悄钻进我的树洞","用一片叶子  挠着我的脚心","我哭笑不得  睁开眼","看见你笑成月牙的眼","你举着叶子做成的本","说要考考我","快说快说  别犹豫","今天是什么日子啊","我一边打哈欠","一边努力检索" }

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== 渲染函数 =====
function renderPoem(poem) {
  if (!poem) {
    document.getElementById('section-text').innerHTML = `
      <div class="error-box">
        <div class="error-char">🍃</div>
        <div>未找到该诗篇，请返回诗河重新选择</div>
      </div>`;
    return;
  }

  // Hero 区
  const numStr = String(poem.num).padStart(3, '0');
  document.getElementById('poemNumber').textContent = 'NO.' + numStr;
  document.getElementById('poemChar').textContent = poem.char;
  document.getElementById('poemFullTitle').textContent = poem.full_title || ('森林的孩子·' + poem.char);
  document.title = '爱（AI）解题叶渡诗河 · ' + poem.char;
  document.getElementById('navSubtitle').textContent = 'NO.' + numStr + ' / 162';

  const stats = poem.stats || {};
  document.getElementById('poemStats').innerHTML = [
    stats.total_chars ? `<span class="stat-badge">${stats.total_chars} 字</span>` : '',
    stats.line_count ? `<span class="stat-badge">${stats.line_count} 行</span>` : '',
    stats.stanza_count ? `<span class="stat-badge">${stats.stanza_count} 节</span>` : '',
    poem.overview && poem.overview.theme ? `<span class="stat-badge">${poem.overview.theme}</span>` : '',
    poem.overview && poem.overview.emotion_tone ? `<span class="stat-badge">${poem.overview.emotion_tone}</span>` : '',
  ].join('');

  // 原文 - 直接显示原文档完整内容（含全角空格 stanza 分段）
  // 全角空格（\u3000）渲染为空行
  let textHtml = '';
  if (poem.original_text) {
    const lines = poem.original_text.split('\n');
    for (const line of lines) {
      if (line.replace(/\u3000/g, '').trim() === '' && line.includes('\u3000')) {
        // 全角空格-only 行 → 空行（stanza 分隔）
        textHtml += '<br><br>';
      } else {
        // 正常行 → 保留换行，全角空格渲染为空格
        textHtml += `<div class="poem-text">${escapeHtml(line.replace(/\u3000/g, '　'))}</div>`;
      }
    }
  } else {
    // 兜底：用 raw_lines
    const rawArr = poem.raw_lines || [];
    textHtml = rawArr.length > 0
      ? `<div class="poem-text">${escapeHtml(rawArr.join('\n'))}</div>`
      : `<div class="poem-text">暂无原文内容</div>`;
  }
  document.getElementById('section-text').innerHTML = `
    <div class="poem-text-box">${textHtml}</div>`;

  // 配图
  const folder = poem.folder || ('output-' + poem.char);
  let imageHtml = '';
  if (poem.has_dual_images) {
    // 双图诗歌：滑动轮播
    imageHtml = `
    <div class="card" style="margin-top:20px">
      <div class="card-title">配图</div>
      <div class="image-slider">
        <div class="slider-container" id="imgSlider">
          <img src="${folder}/image-1.jpg" alt="${escapeHtml(poem.char)}配图1" class="slider-img"
               onerror="this.style.display='none'">
          <img src="${folder}/image-2.jpg" alt="${escapeHtml(poem.char)}配图2" class="slider-img"
               onerror="this.style.display='none'">
        </div>
        <div class="slider-dots" id="sliderDots"></div>
        <div class="slider-arrows">
          <button class="slider-btn" onclick="slideImg(-1)">&#10094;</button>
          <button class="slider-btn" onclick="slideImg(1)">&#10095;</button>
        </div>
      </div>
    </div>`;
  } else {
    const imgSrc = folder + '/image.jpg';
    imageHtml = `
    <div class="card" style="margin-top:20px">
      <div class="card-title">配图</div>
      <img src="${imgSrc}" alt="${escapeHtml(poem.char)}配图" class="poem-image"
           onerror="this.outerHTML='<div class=media-placeholder>暂无配图</div>'">
    </div>`;
  }
  document.getElementById('section-image').innerHTML = imageHtml;

  // 初始化轮播（如果需要）
  if (poem.has_dual_images) {
    window.currentSlide = 0;
    window.sliderTimer = null;
    const imgs = document.querySelectorAll('.slider-img');
    const dotsContainer = document.getElementById('sliderDots');
    if (imgs.length > 0) {
      // 创建 dots
      dotsContainer.innerHTML = '';
      imgs.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goToSlide(i);
        dotsContainer.appendChild(dot);
      });
      showSlide(0);
      // 自动轮播
      window.sliderTimer = setInterval(() => slideImg(1), 4000);
    }
  }

  // 配乐
  let audioHtml = '';
  if (poem.has_dual_audio) {
    // 双音频诗歌：上下排列
    audioHtml = `
    <div class="card" style="margin-top:20px">
      <div class="card-title">配乐朗诵</div>
      <div class="audio-item">
        <div class="audio-label">${escapeHtml(poem.char)} - 第1段</div>
        <audio controls src="${folder}/audio-1.mp3">您的浏览器不支持音频播放</audio>
      </div>
      <div class="audio-item">
        <div class="audio-label">${escapeHtml(poem.char)} - 第2段</div>
        <audio controls src="${folder}/audio-2.mp3">您的浏览器不支持音频播放</audio>
      </div>
    </div>`;
  } else {
    const audSrc = folder + '/audio.mp3';
    audioHtml = `
    <div class="card" style="margin-top:20px">
      <div class="card-title">配乐朗诵</div>
      <div class="audio-player">
        <audio controls src="${audSrc}">
          您的浏览器不支持音频播放
        </audio>
      </div>
    </div>`;
  }
  document.getElementById('section-audio').innerHTML = audioHtml;

  // 概述
  const ov = poem.overview || {};
  document.getElementById('section-overview').innerHTML = `
    <div class="card">
      <div class="card-title">内容摘要</div>
      <p style="line-height:1.9;font-size:15px;color:var(--text2)">${escapeHtml(ov.summary || poem.char + '，森林的孩子系列诗篇。')}</p>
    </div>
    <div class="info-row">
      <div class="info-cell"><div class="info-label">核心主题</div><div class="info-value">${escapeHtml(ov.theme || '-')}</div></div>
      <div class="info-cell"><div class="info-label">情感基调</div><div class="info-value">${escapeHtml(ov.emotion_tone || '-')}</div></div>
      <div class="info-cell"><div class="info-label">核心意象</div><div class="info-value">${escapeHtml(ov.core_image || poem.char)}</div></div>
      <div class="info-cell"><div class="info-label">所属系列</div><div class="info-value">${escapeHtml(poem.series || '森林的孩子')}</div></div>
    </div>
    <div class="card">
      <div class="card-title">关键词</div>
      <div class="tags">${(ov.keywords||[]).map(k=>`<span class="tag gold">${escapeHtml(k)}</span>`).join('')}</div>
    </div>`;

  // 文化背景
  const bg = poem.background || {};
  document.getElementById('section-background').innerHTML = `
    <div class="card">
      <div class="card-title">文化脉络</div>
      <p style="line-height:1.9;font-size:15px;color:var(--text2)">${escapeHtml(bg.cultural || '本诗承载着中国传统文化的深厚底蕴，与森林主题相辅相成。')}</p>
    </div>
    <div class="card">
      <div class="card-title">与森林主题的连接</div>
      <p style="line-height:1.9;font-size:15px;color:var(--text2)">${escapeHtml(bg.forest_connection || '')}</p>
    </div>
    <div class="card">
      <div class="card-title">系列位置</div>
      <p style="line-height:1.9;font-size:15px;color:var(--text2)">${escapeHtml(bg.series_position || '')}</p>
    </div>`;

  // 人物
  const chars = poem.characters || [];
  document.getElementById('section-characters').innerHTML = `
    <div class="card">
      <div class="card-title">登场角色（${chars.length}）</div>
      <div class="char-grid">
        ${chars.map(c => `
          <div class="char-card">
            <div class="char-name">${escapeHtml(c.name)}</div>
            <div class="char-role">${escapeHtml(c.role)}</div>
            <div class="char-desc">${escapeHtml(c.description || '')}</div>
          </div>`).join('')}
      </div>
    </div>`;

  // 时间线
  const tl = poem.timeline || [];
  document.getElementById('section-timeline').innerHTML = `
    <div class="card">
      <div class="card-title">叙事结构（${tl.length} 阶段）</div>
      <div class="timeline">
        ${tl.map((t, i) => `
          <div class="timeline-item">
            <div class="timeline-dot"><span>${i+1}</span></div>
            <div class="timeline-phase">${escapeHtml(t.phase)}</div>
            <div class="timeline-content">
              <div class="timeline-lines">${escapeHtml((t.lines||[]).join('\n'))}</div>
              <div>${escapeHtml(t.description || '')}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;

  // 价值观
  const val = poem.values || {};
  document.getElementById('section-values').innerHTML = `
    <div class="value-main">${escapeHtml(val.core || '在森林的世界里，每一个生命都值得被温柔对待。')}</div>
    <div class="card">
      <div class="card-title">延伸解读</div>
      ${(val.extended||[]).map(v => `<div class="value-item">${escapeHtml(v)}</div>`).join('')}
    </div>
    <div class="value-children">${escapeHtml(val.for_children || '')}</div>`;

  // 章节拆解
  const chs = poem.chapters || [];
  document.getElementById('section-chapters').innerHTML = `
    <div style="margin-bottom:20px">
      ${chs.map(c => `
        <div class="chapter-item">
          <div class="chapter-header">
            <div class="chapter-num">${c.index}</div>
            <div class="chapter-title">${escapeHtml(c.title)}</div>
            <div class="chapter-stats">${c.char_count||0} 字</div>
          </div>
          <div class="chapter-text">${escapeHtml((c.lines||[]).join('\n'))}</div>
          <div class="chapter-analysis">${escapeHtml(c.analysis || '')}</div>
        </div>`).join('')}
    </div>`;

  // 文学手法
  const techs = poem.literary_techniques || [];
  const techDescs = {
    '拟人': '赋予自然物或动物以人的情感、行为，使形象生动',
    '比喻': '用熟悉事物比喻陌生事物，化抽象为具体',
    '排比': '用结构相似的句式反复强调，增强节奏感',
    '象征': '以具体事物寄托抽象意义，意在言外',
    '对话': '通过人物对话推动叙事，增加真实感',
    '意象叠加': '多个自然意象并置，营造丰富的诗境',
    '重复/复沓': '关键语句反复出现，强化情感与主题',
    '借景抒情': '通过描写自然景物来表达内心情感',
    '叙事抒情': '以叙述故事的方式融入情感，情理相融',
  };
  document.getElementById('section-techniques').innerHTML = `
    <div class="card">
      <div class="card-title">文学手法（${techs.length}）</div>
      <div class="technique-grid">
        ${techs.map(t => `
          <div class="technique-card">
            <div class="technique-name">${escapeHtml(t)}</div>
            <div class="technique-desc">${escapeHtml(techDescs[t] || '诗歌创作的重要表现手法')}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card" style="margin-top:20px">
      <div class="card-title">综合赏析</div>
      <p style="line-height:1.9;color:var(--text2);font-size:15px">
        《${escapeHtml(poem.char)}》综合运用${escapeHtml(techs.join('、'))}等手法，
        以${escapeHtml((poem.overview&&poem.overview.emotion_tone)||'细腻')}的笔触，
        展现了${escapeHtml((poem.overview&&poem.overview.theme)||'生命')}主题的深度与广度。
        全诗${(poem.stats&&poem.stats.total_chars)||0}字，字字珠玑，
        以极简的文字承载了丰富的情感内涵，体现了叶渡创作的精妙之处。
      </p>
    </div>`;

  // 诗篇上下翻页
  renderPoemNav(poem.num);
}

function renderPoemNav(currentNum) {
  const keys = Object.keys(POEM_DATA).sort((a, b) => parseInt(a) - parseInt(b));
  const idx = keys.findIndex(k => parseInt(k) === currentNum);
  const prevKey = idx > 0 ? keys[idx - 1] : null;
  const nextKey = idx < keys.length - 1 ? keys[idx + 1] : null;
  const prev = prevKey ? POEM_DATA[prevKey] : null;
  const next = nextKey ? POEM_DATA[nextKey] : null;

  document.getElementById('poemNavBar').innerHTML = `
    <div class="poem-nav">
      <div>
        ${prev ? `<button class="nav-poem-btn" onclick="navigatePoem(${prev.num})">
          ← <span class="nav-poem-char">${escapeHtml(prev.char)}</span> 上一篇
        </button>` : '<div></div>'}
      </div>
      <button class="back-btn" onclick="goBack()" style="font-size:13px">回诗河</button>
      <div>
        ${next ? `<button class="nav-poem-btn" onclick="navigatePoem(${next.num})">
          下一篇 <span class="nav-poem-char">${escapeHtml(next.char)}</span> →
        </button>` : '<div></div>'}
      </div>
    </div>`;
}

function navigatePoem(num) {
  const key = String(num).padStart(2, '0');
  const poem = POEM_DATA[key] || POEM_DATA[String(num)];
  if (poem) {
    history.replaceState(null, '', `poem.html?id=${String(num).padStart(2,'0')}`);
    switchTab('text');
    window.scrollTo(0, 0);
    renderPoem(poem);
  }
}

// ===== 图片轮播函数 =====
let currentSlide = 0;
let sliderTimer = null;
function showSlide(n) {
  const container = document.getElementById('imgSlider');
  const imgs = document.querySelectorAll('.slider-img');
  const dots = document.querySelectorAll('.dot');
  if (!container || imgs.length === 0) return;
  currentSlide = (n + imgs.length) % imgs.length;
  container.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
  dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
}
function slideImg(dir) {
  clearInterval(sliderTimer);
  showSlide(currentSlide + dir);
  sliderTimer = setInterval(() => slideImg(1), 4000);
}
function goToSlide(n) {
  clearInterval(sliderTimer);
  showSlide(n);
  sliderTimer = setInterval(() => slideImg(1), 4000);
}

// ===== 初始化 =====
function init() {
  const idParam = getUrlParam('id') || getUrlParam('num') || '01';
  const numInt = parseInt(idParam, 10);

  // 尝试多种key格式
  const poem = POEM_DATA[String(numInt).padStart(2, '0')]
            || POEM_DATA[String(numInt).padStart(3, '0')]
            || POEM_DATA[String(numInt)];

  if (poem) {
    renderPoem(poem);
  } else {
    document.getElementById('section-text').innerHTML = `
      <div class="error-box">
        <div class="error-char">🌿</div>
        <p>未找到编号 ${escapeHtml(idParam)} 的诗篇</p>
        <br>
        <button class="back-btn" onclick="goBack()">返回诗河</button>
      </div>`;
  }
}

init();
</script>
