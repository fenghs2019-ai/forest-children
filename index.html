<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>爱（AI）解诗河 · 全篇导览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1f12;--bg2:#102016;--bg3:#152b1a;
  --accent:#52c276;--accent2:#76d896;--accent3:#a8e6c0;
  --text:#e8f5e9;--text2:#b2dfdb;--text3:#80cbc4;
  --gold:#f9d56e;--gold2:#fbe599;
  --card:#1e3a24;--card2:#243d2a;
}
body{background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","PingFang SC",sans-serif;min-height:100vh;overflow-x:hidden}

.header{
  background:linear-gradient(180deg,var(--bg2),var(--bg));
  padding:48px 24px 32px;text-align:center;
  border-bottom:1px solid rgba(82,194,118,0.15);
  position:relative;overflow:hidden;
}
.header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% -20%,rgba(82,194,118,0.1),transparent 60%);
  pointer-events:none;
}
.header-series{font-size:13px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:12px;}
.header-title{
  font-size:clamp(24px,5vw,42px);font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--accent2),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(249,213,110,0.2));
}
.header-subtitle{font-size:16px;color:var(--text3);margin-bottom:24px;letter-spacing:2px;}
.header-desc{font-size:14px;color:var(--text3);max-width:560px;margin:0 auto 24px;line-height:1.8;}
.stats-row{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:8px;}
.stat-item{text-align:center}
.stat-num{font-size:32px;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums;}
.stat-label{font-size:12px;color:var(--text3);letter-spacing:1px;margin-top:2px;}


.toolbar{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  padding:20px 24px;background:rgba(13,31,18,0.95);
  border-bottom:1px solid rgba(82,194,118,0.1);
}
.search-row,.filter-row{display:flex;justify-content:center;width:100%;flex-wrap:wrap;gap:10px}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid rgba(82,194,118,0.25);
  border-radius:20px;padding:6px 16px;flex:0 0 auto;
}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:14px;width:160px;}
.search-box input::placeholder{color:var(--text3)}
.filter-btn{
  background:var(--card);border:1px solid rgba(82,194,118,0.2);
  border-radius:16px;padding:6px 14px;font-size:13px;
  color:var(--text3);cursor:pointer;transition:all 0.2s;
}
.filter-btn:hover,.filter-btn.active{background:rgba(82,194,118,0.15);border-color:var(--accent);color:var(--accent);}

.river-container{max-width:1200px;margin:0 auto;padding:32px 20px;}
.river-title{font-size:13px;color:var(--text3);letter-spacing:3px;text-align:center;margin-bottom:24px;}

.chars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:10px;}
.char-btn{
  aspect-ratio:1;border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;border:1px solid transparent;transition:all 0.2s;
  position:relative;overflow:hidden;text-decoration:none;
}
.char-btn.done{background:linear-gradient(135deg,var(--card),var(--card2));border-color:rgba(82,194,118,0.35);}
.char-btn.done:hover{
  transform:translateY(-3px) scale(1.05);
  border-color:var(--accent);
  box-shadow:0 8px 24px rgba(82,194,118,0.25);
  background:linear-gradient(135deg,var(--card2),#2e4d36);
}
.char-num{font-size:10px;color:var(--text3);margin-bottom:2px;}
.char-word{font-size:28px;font-weight:700;color:var(--accent2);line-height:1;transition:color 0.2s;}
.char-btn.done:hover .char-word{color:var(--gold)}
.char-theme{font-size:9px;color:var(--text3);margin-top:3px;opacity:0;transition:opacity 0.2s;}
.char-btn.done:hover .char-theme{opacity:1}

.char-btn.hidden{display:none}
.char-btn.highlight .char-word{color:var(--gold)!important}
.char-btn.highlight{border-color:var(--gold)!important;box-shadow:0 0 16px rgba(249,213,110,0.3)}
.no-result-msg{display:none;text-align:center;padding:48px 20px;font-size:15px;color:var(--text3);font-style:italic;letter-spacing:2px;line-height:2}
.no-result-msg.show{display:block}

.footer{
  text-align:center;padding:32px 16px;color:var(--text3);font-size:13px;
  border-top:1px solid rgba(82,194,118,0.1);line-height:2;
}
@media(max-width:480px){
  .chars-grid{grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:7px;}
  .char-word{font-size:22px}
  .toolbar{padding:10px 12px}
}
</style>
</head>

<header class="header">
  <div class="header-series">森林的孩子 &middot; 故事诗系列</div>

  <div class="header-subtitle">每一个字，都是一个故事</div>
  <div class="header-desc">老生  著 &middot; 162首故事诗 &middot; AI结构化解析 &middot; 完整呈现</div>
  <div class="stats-row">
    <div class="stat-item"><div class="stat-num">162</div><div class="stat-label">总篇数</div></div>

</header>

<div class="toolbar">
  <div class="search-row">
    <div class="search-box">

      <input type="text" id="searchInput" placeholder="搜索诗字…" oninput="filterPoems(this.value)">

  <div class="filter-row">

    <button class="filter-btn" data-filter="情感" onclick="setFilter('情感',this)">情感心境</button>
    <button class="filter-btn" data-filter="哲思" onclick="setFilter('哲思',this)">人生哲思</button>
    <button class="filter-btn" data-filter="精神" onclick="setFilter('精神',this)">精神追求</button>
  </div>
</div>

<div class="river-container">
  <div class="river-title">&middot; 点击任意汉字，进入诗篇解析 &middot;</div>
  <div class="chars-grid" id="charsGrid"></div>
  <div id="noResultMsg" class="no-result-msg">抱歉哦，写了这个字的叶子，还在悄悄地长，等等，等等看。</div>
</div>

<footer class="footer">
  <div>《森林的孩子》故事诗 &middot; 老生  著</div>
  <div>爱（AI）解诗河 &middot; AI结构化解析平台</div>
  <div style="margin-top:8px;font-size:11px;color:var(--text3);opacity:0.6">共162篇 &middot; 含原文、概述、文化背景、人物、时间线、价值观、章节拆解、文学手法</div>
</footer>

const THEME_MAP = {
  "自然": "秋春夏冬风雨雪雾冰融露虹云晴晨夜明光",
  "动物": "羽鱼蒲萤蝶龟蛇鹿枭雀马蜗蜜螺铃狐蜓凤蜗",
  "草木": "荷叶树芽落葵榛果种",
  "情感": "爱怜悲悦怒恕愁悟困伤默念忆思梦静暖伤",
  "人生": "路行渡流停望闯空真闲忙时光明年元凡城尘洲门镜舟匠聚钓诱香丝战波暖匠心逢网果香丝聚诱丝藏妖愿门镜湖丝颜倦封破等祈",
  "精神": "诗琴棋画歌舞幻术智舞",
  "哲思": "桥守寻和智变真信义诺法",
  "成长": "试梯潜补息知懂变信义诺法赢累错惑病缘",
  "思念": "归远想忘别盼忆念想",
  "旅途": "跑游倦闯空闲离忙停行闯",
  "生命": "蒲荷树芽果种生落葵榛",
  "时光": "静夜年光阴晓醒眠醉明晨元时"
};

function getCharTheme(char) {
  for (const [theme, chars] of Object.entries(THEME_MAP)) {
    if (chars.includes(char)) return theme;
  }
  return "";
}

let currentFilter = "";

function renderGrid(data) {
  const grid = document.getElementById("charsGrid");
  grid.innerHTML = "";
  const entries = Object.values(data).sort((a, b) => a.num - b.num);
  entries.forEach(p => {
    const numStr = String(p.num).padStart(2, "0");
    const theme = p.theme || getCharTheme(p.char) || "";
    const btn = document.createElement("a");
    btn.className = "char-btn done";
    btn.href = "./poem.html?id=" + numStr;
    btn.dataset.filter = theme;
    btn.dataset.char = p.char;
    btn.dataset.num = p.num;
    btn.title = "No." + p.num + " " + p.char + (p.chars ? " · " + p.chars + "字" : "") + (theme ? " · " + theme : "");
    btn.innerHTML = "<div class=\"char-num\">" + p.num + "</div><div class=\"char-word\">" + p.char + "</div><div class=\"char-theme\">" + theme + "</div>";
    grid.appendChild(btn);
  });
}

function filterPoems(query) {
  const q = query.trim();
  let visibleCount = 0;
  document.querySelectorAll(".char-btn").forEach(btn => {
    const char = btn.dataset.char || "";
    const num = btn.dataset.num || "";
    const matchSearch = !q || char.includes(q) || num.includes(q);
    const matchFilter = currentFilter === "" || btn.dataset.filter === currentFilter;
    const visible = matchSearch && matchFilter;
    btn.classList.toggle("hidden", !visible);
    btn.classList.toggle("highlight", q.length > 0 && char.includes(q));
    if (visible) visibleCount++;
  });
  const noResultMsg = document.getElementById("noResultMsg");
  if (q.length > 0 && visibleCount === 0) {
    noResultMsg.classList.add("show");
  } else {
    noResultMsg.classList.remove("show");
  }
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  if (el) el.classList.add("active");
  filterPoems(document.getElementById("searchInput").value);
}

renderGrid(NAV_DATA);
const doneCount = Object.values(NAV_DATA).filter(p => p.status === "completed").length;
document.getElementById("doneCount").textContent = doneCount;
